<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OurWorld Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Babel for runtime JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
      /* Custom scrollbar for widgets */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      .canvas-pattern {
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Custom scrollbar for space list */
      .space-list-scroll::-webkit-scrollbar { width: 6px; }
      .space-list-scroll::-webkit-scrollbar-track { background: transparent; }
      .space-list-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
      .space-list-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
